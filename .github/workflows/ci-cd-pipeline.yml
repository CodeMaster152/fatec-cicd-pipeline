name: CI/CD Pipeline com CodeQL

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:

  codeql-analysis:
    name: 🔒 Análise CodeQL
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          config-file: ./.github/codeql-config.yml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Executar análise CodeQL
        uses: github/codeql-action/analyze@v3

  tests:
    name: 🧪 Testes Automatizados
    needs: codeql-analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Executar testes
        run: |
          pytest

      - name: Verificar qualidade do código
        run: |
          flake8 .

  deploy-stage:
    name: 🚀 Deploy para Stage
    needs: [codeql-analysis, tests]
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Simulação de deploy
        run: |
          echo "Deploy realizado com sucesso no ambiente stage!"